#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "sharkey"
name = "Sharkey"
description.en = "Microblogging platform"
description.fr = "Platforme de Microblogging"

version = "2025.4.4~ynh1"

maintainers = ["oufmilo"]

[upstream]
license = "AGPL-3.0"
website = "https://git.joinsharkey.org/Sharkey"
code = "https://activitypub.software/TransFem-org/Sharkey"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    help.en = "If enabled, Sharkey will be accessible by people who do not have an account. This can be changed later via the webadmin."
    help.fr = "Si cette case est cochée, Sharkey sera accessible aux personnes n’ayant pas de compte. Vous pourrez changer ceci plus tard via la webadmin."
    type = "group"
    default = "visitors"

[resources]

    [resources.sources.main]
    url = "https://activitypub.software/TransFem-org/Sharkey/-/archive/2025.4.4/Sharkey-2025.4.4.tar.bz2"
    sha256 = "c488276db477fdc855553de5d7371f54b95c04590bdca04aac27b1d31f1aed55"
    autoupdate.strategy = "latest_gitlab_release"

    [resources.sources.fluent-emojis]
    url = "https://github.com/misskey-dev/emojis/archive/cae981eb4c5189ea9ea3230e83b876a5068df7d1.zip"
    sha256 = "f94e653fa13c39974bf76ead82844a6ef967adf8443274f903b416793bbfc0fc"

    [resources.sources.tossface-emojis]
    url = "https://activitypub.software/TransFem-org/tossface-emojis/-/archive/444a15c3e1aca175039660f2cd16981a017856fd/tossface-emojis-444a15c3e1aca175039660f2cd16981a017856fd.tar.gz"
    sha256 = "621295c8a2b7b6f0ccf162241353d8444941c09a31bc22c0f15165b04e9e5397"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "ffmpeg, postgresql, git, build-essential, redis-server, pkg-config, libpango1.0-dev, libcairo2-dev, libpixman-1-dev, librsvg2-2, fonts-noto"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "22"
